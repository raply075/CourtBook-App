name: courtbook
description: "CourtBook - Aplikasi Booking Lapangan Olahraga"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Backend
  supabase_flutter: ^2.9.1

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

  # UI
  flutter_svg: ^2.2.0
  flutter_spinkit: ^5.2.1

  # Internet
  connectivity_plus: ^6.1.5

  provider: ^6.1.5
  # bar
  fl_chart: ^1.1.0

  # pdf
  pdf: ^3.11.0
  printing: ^5.13.4

  # excel
  excel: ^4.0.6
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  share_plus: ^11.0.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/icons/
